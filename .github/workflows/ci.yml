name: Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t liquid-biopsy-pipeline .

      - name: Run full pipeline on tiny CI fixture
        run: |
          docker run -v ${{ github.workspace }}:/pipeline liquid-biopsy-pipeline \
            --reads 'tests/fixtures/reads/*_R{1,2}.fastq' \
            --transcriptome tests/fixtures/transcriptome_ci.fa \
            --samplesheet tests/fixtures/samplesheet_ci.csv \
            --outdir tests/ci_results

      - name: Verify outputs exist
        run: |
          test -f tests/ci_results/deseq2_results.csv
          test -f tests/ci_results/volcano_plot.png
          test -f tests/ci_results/pca_plot.png
          test -f tests/ci_results/heatmap.png
          echo "All expected outputs present."
